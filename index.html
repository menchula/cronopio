<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Cronopio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>

<h1>Cronopio</h1>

<p class="subtitle">Buenos días, Carmen ✨</p>

</header>

<section class="card hero">

<div class="hero-left">

<p class="small">Alignment</p>

<h2 id="alignmentScore">76%</h2>

<p class="wow">▲ +8% vs semana pasada</p>

</div>

<div class="hero-right">

<div class="ring">

<div id="ringValue">76%</div>

</div>

</div>

</section>

<section class="card coach">

<h2>Tu Coach</h2>

<h3 id="focusTitle">

Pulsa para generar tu día

</h3>

<p id="coachMessage">

Cronopio analizará tus objetivos y preparará tus misiones.

</p>

<button onclick="generateDay()">

Generar mi día

</button>

</section>

<section class="card">

<div class="progress-header">

<h2>Progreso de hoy</h2>

<span id="progressLabel">

0%

</span>

</div>

<div class="progress">

<div
id="progressFill"
class="progress-fill">

</div>

</div>

</section>

<section class="card">

<div class="missionsHeader">

<h2>Misiones</h2>

<button
class="plus"
onclick="addTask()">

＋

</button>

</div>

<div id="customTasks">

</div>

</section>

<nav>

<div>🏠</div>

<div>📊</div>

<div>🎯</div>

<div>👤</div>

</nav>

</div>

<script src="app.js"></script>

</body>
</html>
